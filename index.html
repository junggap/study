<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Portal & Knowledge Base</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Dark Theme Colors (Default) */
            --bg-page: #0b0f19;
            --bg-sidebar: #111827;
            --bg-card: #1f2937;
            --bg-card-hover: #2d3748;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --primary: #6366f1;
            --primary-light: rgba(99, 102, 241, 0.1);
            --primary-glow: rgba(99, 102, 241, 0.35);
            --accent-english: #3b82f6;
            --accent-proposal: #10b981;
            --accent-study: #8b5cf6;
            --scroll-thumb: #4b5563;
            --scroll-track: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            /* Light Theme Colors */
            --bg-page: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --primary: #4f46e5;
            --primary-light: rgba(79, 70, 229, 0.08);
            --primary-glow: rgba(79, 70, 229, 0.2);
            --accent-english: #2563eb;
            --accent-proposal: #059669;
            --accent-study: #7c3aed;
            --scroll-thumb: #cbd5e1;
            --scroll-track: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        /* --- Scrollbar styling --- */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scroll-track);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* --- Sidebar layout --- */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
            transition: var(--transition-smooth);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            background: linear-gradient(135deg, var(--primary), #ec4899);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }

        .brand-info {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Search Box */
        .search-container {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            background-color: var(--bg-page);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 14px 10px 40px;
            color: var(--text-main);
            font-size: 0.875rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition-smooth);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            width: 16px;
            height: 16px;
        }

        /* Category Nav */
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .nav-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-badge {
            background-color: var(--primary-light);
            color: var(--primary);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 999px;
            font-weight: 600;
        }

        .nav-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav-item {
            cursor: pointer;
            padding: 10px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition-smooth);
            position: relative;
        }

        .nav-item:hover {
            color: var(--text-main);
            background-color: var(--bg-card-hover);
        }

        .nav-item.active {
            color: var(--primary);
            background-color: var(--primary-light);
            font-weight: 600;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 4px;
            background-color: var(--primary);
            border-radius: 0 4px 4px 0;
        }

        .nav-item-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .nav-item-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .theme-toggle-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .theme-toggle-btn:hover {
            background-color: var(--bg-card-hover);
            border-color: var(--text-muted);
        }

        .theme-icon-sun {
            display: block !important;
        }
        .theme-icon-moon {
            display: none !important;
        }
        body[data-theme="light"] .theme-icon-sun {
            display: none !important;
        }
        body[data-theme="light"] .theme-icon-moon {
            display: block !important;
        }

        .github-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .github-link:hover {
            color: var(--text-main);
        }

        /* --- Main Content Area --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            background-color: var(--bg-page);
        }

        /* Topbar Header */
        .topbar {
            height: 70px;
            border-bottom: 1px solid var(--border-color);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-sidebar);
            z-index: 5;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .menu-btn:hover {
            background-color: var(--bg-card-hover);
        }

        .doc-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .doc-category-tag {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 6px;
            letter-spacing: 0.05em;
        }

        .doc-category-tag.english {
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--accent-english);
        }

        .doc-category-tag.proposal {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--accent-proposal);
        }

        .doc-category-tag.study {
            background-color: rgba(139, 92, 246, 0.15);
            color: var(--accent-study);
        }

        .doc-active-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-main);
            max-width: 450px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar-action-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            transition: var(--transition-smooth);
        }

        .topbar-action-btn:hover {
            color: var(--text-main);
            background-color: var(--bg-card-hover);
            border-color: var(--text-muted);
        }

        .topbar-action-btn.primary {
            background-color: var(--primary);
            color: white;
            border-color: transparent;
        }

        .topbar-action-btn.primary:hover {
            background-color: #4f46e5;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        /* Content Frames and Views */
        .view-content {
            flex: 1;
            position: relative;
            width: 100%;
            height: calc(100vh - 70px);
            background-color: var(--bg-page);
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
        }

        .iframe-container.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff; /* Native page backgrounds are light */
        }

        /* Loader */
        .iframe-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-page);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 2;
            transition: opacity 0.3s ease;
            pointer-events: none;
            opacity: 0;
        }

        .iframe-loader.loading {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Welcome Dashboard View */
        .dashboard-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 48px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            background-color: var(--bg-page);
        }

        .dashboard-header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        .dashboard-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--text-main) 60%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            line-height: 1.6;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-sm);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .stat-icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-light);
            color: var(--primary);
        }

        .stat-icon-wrapper.english {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--accent-english);
        }

        .stat-icon-wrapper.proposal {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--accent-proposal);
        }

        .stat-icon-wrapper.study {
            background-color: rgba(139, 92, 246, 0.1);
            color: var(--accent-study);
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* Cards Grid */
        .cards-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-headline {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .doc-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-sm);
        }

        .doc-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
        }

        /* Glow effect on hover */
        .doc-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .doc-card.english::after { background: var(--accent-english); }
        .doc-card.proposal::after { background: var(--accent-proposal); }
        .doc-card.study::after { background: var(--accent-study); }

        .doc-card:hover::after {
            transform: scaleX(1);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-badge {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .doc-card.english .card-badge {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--accent-english);
        }

        .doc-card.proposal .card-badge {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--accent-proposal);
        }

        .doc-card.study .card-badge {
            background-color: rgba(139, 92, 246, 0.15);
            color: var(--accent-study);
        }

        .card-icon {
            width: 24px;
            height: 24px;
            color: var(--text-muted);
            transition: var(--transition-smooth);
        }

        .doc-card:hover .card-icon {
            color: var(--primary);
            transform: scale(1.1);
        }

        .doc-card.english:hover .card-icon { color: var(--accent-english); }
        .doc-card.proposal:hover .card-icon { color: var(--accent-proposal); }
        .doc-card.study:hover .card-icon { color: var(--accent-study); }

        .card-middle {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.4;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .card-action {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--primary);
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .doc-card.english .card-action { color: var(--accent-english); }
        .doc-card.proposal .card-action { color: var(--accent-proposal); }
        .doc-card.study .card-action { color: var(--accent-study); }

        .doc-card:hover .card-action {
            gap: 8px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-icon {
            color: #10b981;
            width: 18px;
            height: 18px;
        }

        /* --- Media Queries --- */
        @media (max-width: 992px) {
            .sidebar {
                position: absolute;
                left: -320px;
                box-shadow: var(--shadow-lg);
            }

            .sidebar.open {
                left: 0;
            }

            .menu-btn {
                display: flex;
            }

            .doc-active-title {
                max-width: 250px;
            }
        }

        @media (max-width: 576px) {
            .dashboard-container {
                padding: 24px;
                gap: 24px;
            }

            .dashboard-header h1 {
                font-size: 2rem;
            }

            .doc-active-title {
                display: none;
            }
        }
    </style>
</head>
<body data-theme="dark">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <div class="brand-logo">J</div>
                <div class="brand-info">
                    <span class="brand-name">Study Vault</span>
                    <span class="brand-subtitle">Knowledge Portal</span>
                </div>
            </div>

            <!-- Search box -->
            <div class="search-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" class="search-input" id="search-input" placeholder="검색 또는 필터링..." autocomplete="off">
            </div>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav">
            <!-- Dynamic Navigation Sections will load here -->
        </nav>

        <div class="sidebar-footer">
            <button class="theme-toggle-btn" id="theme-toggle" title="테마 변경">
                <i data-lucide="sun" class="theme-icon-sun"></i>
                <i data-lucide="moon" class="theme-icon-moon"></i>
            </button>
            <a href="https://github.com/junggap" target="_blank" class="github-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-github">
                    <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
                    <path d="M9 18c-4.51 2-5-2-7-2"/>
                </svg>
                <span>GitHub Pages</span>
            </a>
        </div>
    </aside>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-btn" id="menu-btn">
                    <i data-lucide="menu"></i>
                </button>
                <div class="doc-header-info" id="doc-header-info" style="display: none;">
                    <span class="doc-category-tag" id="doc-category-tag">study</span>
                    <h2 class="doc-active-title" id="doc-active-title">Document Title</h2>
                </div>
                <div class="doc-header-info" id="home-header-info">
                    <span class="doc-category-tag" style="background-color: var(--primary-light); color: var(--primary);">Home</span>
                    <h2 class="doc-active-title">대시보드</h2>
                </div>
            </div>

            <div class="topbar-right">
                <button class="topbar-action-btn" id="home-btn" style="display: none;">
                    <i data-lucide="home" style="width: 16px; height: 16px;"></i>
                    <span>홈으로</span>
                </button>
                <button class="topbar-action-btn" id="copy-link-btn" style="display: none;" title="문서 주소 복사">
                    <i data-lucide="link" style="width: 16px; height: 16px;"></i>
                    <span>링크 복사</span>
                </button>
                <a href="#" target="_blank" class="topbar-action-btn primary" id="external-btn" style="display: none;">
                    <i data-lucide="external-link" style="width: 16px; height: 16px;"></i>
                    <span>새 창에서 열기</span>
                </a>
            </div>
        </header>

        <!-- View Content -->
        <div class="view-content">
            <!-- Iframe view -->
            <div class="iframe-container" id="iframe-container">
                <div class="iframe-loader" id="iframe-loader">
                    <div class="spinner"></div>
                    <span class="loader-text">문서를 로딩 중입니다...</span>
                </div>
                <iframe src="" id="doc-iframe" title="Content View"></iframe>
            </div>

            <!-- Home Dashboard View -->
            <div class="dashboard-container" id="dashboard-view">
                <div class="dashboard-header">
                    <h1 id="dashboard-greeting">안녕하세요!</h1>
                    <p>작성된 학습 기록, 기획 제안서 및 영어 스피킹 연습 세션 자료들을 모아둔 허브 포탈입니다. 왼쪽 사이드바나 아래 리스트에서 열람하고 싶은 문서를 선택해주세요.</p>
                </div>

                <!-- Stats summary -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon-wrapper english">
                            <i data-lucide="message-square" style="width: 22px; height: 22px;"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="count-english">0</span>
                            <span class="stat-label">영어 세션</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrapper proposal">
                            <i data-lucide="presentation" style="width: 22px; height: 22px;"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="count-proposal">0</span>
                            <span class="stat-label">기획 제안서</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrapper study">
                            <i data-lucide="compass" style="width: 22px; height: 22px;"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="count-study">0</span>
                            <span class="stat-label">학습 분석</span>
                        </div>
                    </div>
                </div>

                <!-- Cards list -->
                <section class="cards-section">
                    <div class="section-header-row">
                        <h2 class="section-headline">전체 문서 찾아보기</h2>
                    </div>
                    <div class="cards-grid" id="cards-grid">
                        <!-- Dynamic document cards will load here -->
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i data-lucide="check-circle-2" class="toast-icon"></i>
        <span id="toast-message">클립보드에 복사되었습니다!</span>
    </div>

    <!-- Application Script -->
    <script>
        // Database of HTML documents in workspace
        const documents = [
            {
                id: "english-260622.html",
                title: "English Speaking Practice & Expression Log",
                subtitle: "A comprehensive language breakdown of study sessions",
                category: "english",
                date: "2026-06-22",
                icon: "message-square"
            },
            {
                id: "proposal-kids-ai-platform.html",
                title: "질문 학습 플랫폼 — B2C 기획서",
                subtitle: "Interactive question learning platform proposal for kids",
                category: "proposal",
                date: "2026-06-25",
                icon: "presentation"
            },
            {
                id: "study-history-asia.html",
                title: "한국사·중국사·일본사 비교 연표",
                subtitle: "Comparative chronology and related historical events of East Asia",
                category: "study",
                date: "2026-06-25",
                icon: "compass"
            },
            {
                id: "study-ppo.html",
                title: "PPO — Proximal Policy Optimization",
                subtitle: "In-depth study notes on Proximal Policy Optimization algorithm",
                category: "study",
                date: "2026-06-25",
                icon: "cpu"
            },
            {
                id: "study-special-relativity.html",
                title: "특수 상대성 이론 정리",
                subtitle: "Summary notes on the Special Theory of Relativity",
                category: "study",
                date: "2026-06-25",
                icon: "orbit"
            }
        ];

        // Group categories for labels
        const categoryLabels = {
            english: { name: "English Log", icon: "message-square", color: "english" },
            proposal: { name: "Proposal", icon: "presentation", color: "proposal" },
            study: { name: "Study Note", icon: "compass", color: "study" }
        };

        // DOM elements
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menu-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const searchInput = document.getElementById('search-input');
        const sidebarNav = document.getElementById('sidebar-nav');
        const cardsGrid = document.getElementById('cards-grid');
        const dashboardView = document.getElementById('dashboard-view');
        const iframeContainer = document.getElementById('iframe-container');
        const docIframe = document.getElementById('doc-iframe');
        const iframeLoader = document.getElementById('iframe-loader');

        const docHeaderInfo = document.getElementById('doc-header-info');
        const homeHeaderInfo = document.getElementById('home-header-info');
        const docCategoryTag = document.getElementById('doc-category-tag');
        const docActiveTitle = document.getElementById('doc-active-title');

        const homeBtn = document.getElementById('home-btn');
        const copyLinkBtn = document.getElementById('copy-link-btn');
        const externalBtn = document.getElementById('external-btn');
        const toast = document.getElementById('toast');

        // Initial setup and event listeners
        window.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            renderDashboardCards();
            updateStats();
            handleRouting();
            lucide.createIcons();

            // Setup theme based on preference or stored value
            const savedTheme = localStorage.getItem('theme') || 'dark';
            setTheme(savedTheme);
        });

        window.addEventListener('hashchange', handleRouting);

        // Sidebar responsive toggle
        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        // Close sidebar on body click if mobile open
        document.querySelector('.view-content').addEventListener('click', () => {
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        });

        // Theme toggle action
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
        });

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        // Search filtering logic
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            // Filter sidebar elements
            const navItems = sidebarNav.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                const titleText = item.querySelector('.nav-item-title').textContent.toLowerCase();
                const pathText = item.getAttribute('href').toLowerCase();
                if (titleText.includes(query) || pathText.includes(query)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });

            // Hide/show category section titles if empty
            const navSections = sidebarNav.querySelectorAll('.nav-section-wrapper');
            navSections.forEach(section => {
                const visibleItems = section.querySelectorAll('.nav-item[style="display: flex;"]');
                const title = section.querySelector('.nav-section-title');
                if (visibleItems.length === 0 && query !== '') {
                    title.style.display = 'none';
                } else {
                    title.style.display = 'flex';
                }
            });

            // Filter dashboard cards
            const docCards = cardsGrid.querySelectorAll('.doc-card');
            docCards.forEach(card => {
                const cardTitle = card.querySelector('.card-title').textContent.toLowerCase();
                const cardDesc = card.querySelector('.card-desc').textContent.toLowerCase();
                const category = card.getAttribute('data-category').toLowerCase();
                if (cardTitle.includes(query) || cardDesc.includes(query) || category.includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        // Topbar copy link action
        copyLinkBtn.addEventListener('click', () => {
            const currentUrl = window.location.href;
            navigator.clipboard.writeText(currentUrl).then(() => {
                showToast("링크가 클립보드에 복사되었습니다!");
            }).catch(err => {
                console.error("복사 실패: ", err);
            });
        });

        // Home button action
        homeBtn.addEventListener('click', () => {
            window.location.hash = '';
        });

        // Display toast messages
        function showToast(message) {
            toast.querySelector('#toast-message').textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Calculate and update stats counters
        function updateStats() {
            const counts = { english: 0, proposal: 0, study: 0 };
            documents.forEach(doc => {
                if (counts[doc.category] !== undefined) {
                    counts[doc.category]++;
                }
            });
            document.getElementById('count-english').textContent = counts.english;
            document.getElementById('count-proposal').textContent = counts.proposal;
            document.getElementById('count-study').textContent = counts.study;
        }

        // Render dynamic sidebar items
        function renderSidebar() {
            // Group documents by category
            const grouped = {};
            Object.keys(categoryLabels).forEach(cat => grouped[cat] = []);
            
            documents.forEach(doc => {
                if (grouped[doc.category]) {
                    grouped[doc.category].push(doc);
                }
            });

            sidebarNav.innerHTML = '';

            Object.entries(grouped).forEach(([catKey, docs]) => {
                if (docs.length === 0) return;

                const wrapper = document.createElement('div');
                wrapper.className = 'nav-section-wrapper';

                const sectionHeader = document.createElement('div');
                sectionHeader.className = 'nav-section-title';
                sectionHeader.innerHTML = `
                    <span>${categoryLabels[catKey].name}</span>
                    <span class="category-badge">${docs.length}</span>
                `;
                wrapper.appendChild(sectionHeader);

                const ul = document.createElement('ul');
                ul.className = 'nav-list';

                docs.forEach(doc => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <a href="#${doc.id}" class="nav-item" data-id="${doc.id}">
                            <i data-lucide="${doc.icon}" class="nav-item-icon"></i>
                            <span class="nav-item-title" title="${doc.title}">${doc.title}</span>
                        </a>
                    `;
                    ul.appendChild(li);
                });

                wrapper.appendChild(ul);
                sidebarNav.appendChild(wrapper);
            });
        }

        // Render Dashboard Document cards
        function renderDashboardCards() {
            cardsGrid.innerHTML = '';
            
            documents.forEach(doc => {
                const card = document.createElement('div');
                card.className = `doc-card ${doc.category}`;
                card.setAttribute('data-category', doc.category);
                card.innerHTML = `
                    <div class="card-top">
                        <span class="card-badge">${categoryLabels[doc.category].name}</span>
                        <i data-lucide="${doc.icon}" class="card-icon"></i>
                    </div>
                    <div class="card-middle">
                        <h3 class="card-title">${doc.title}</h3>
                        <p class="card-desc">${doc.subtitle}</p>
                    </div>
                    <div class="card-bottom">
                        <span>수정일: ${doc.date}</span>
                        <div class="card-action">
                            <span>읽기</span>
                            <i data-lucide="arrow-right" style="width: 14px; height: 14px;"></i>
                        </div>
                    </div>
                `;

                card.addEventListener('click', () => {
                    window.location.hash = doc.id;
                });

                cardsGrid.appendChild(card);
            });
        }

        // Router handler based on hash URL change
        function handleRouting() {
            const hash = window.location.hash.slice(1); // remove '#'
            
            // Reset active state in sidebar
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            // Close responsive sidebar if open
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }

            if (!hash) {
                // Show dashboard, hide iframe
                dashboardView.style.display = 'flex';
                iframeContainer.classList.remove('active');
                docIframe.src = '';
                
                // Update topbar actions
                docHeaderInfo.style.display = 'none';
                homeHeaderInfo.style.display = 'flex';
                homeBtn.style.display = 'none';
                copyLinkBtn.style.display = 'none';
                externalBtn.style.display = 'none';
            } else {
                const doc = documents.find(d => d.id === hash);
                if (doc) {
                    // Update active state in sidebar
                    const activeNavItem = sidebarNav.querySelector(`.nav-item[data-id="${doc.id}"]`);
                    if (activeNavItem) activeNavItem.classList.add('active');

                    // Show iframe, hide dashboard
                    dashboardView.style.display = 'none';
                    iframeContainer.classList.add('active');
                    
                    // Show loader and set iframe src
                    iframeLoader.classList.add('loading');
                    docIframe.src = doc.id;

                    // Iframe load complete
                    docIframe.onload = () => {
                        iframeLoader.classList.remove('loading');
                    };

                    // Update topbar actions
                    homeHeaderInfo.style.display = 'none';
                    docHeaderInfo.style.display = 'flex';
                    
                    docCategoryTag.className = `doc-category-tag ${doc.category}`;
                    docCategoryTag.textContent = categoryLabels[doc.category].name;
                    docActiveTitle.textContent = doc.title;

                    homeBtn.style.display = 'flex';
                    copyLinkBtn.style.display = 'flex';
                    
                    externalBtn.href = doc.id;
                    externalBtn.style.display = 'flex';
                } else {
                    // Invalid hash, fallback to home
                    window.location.hash = '';
                }
            }
        }
    </script>
</body>
</html>
